name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: project_time_manager
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      - name: Create application user
        run: |
          mysql -h127.0.0.1 -uroot -proot -e "
            CREATE USER IF NOT EXISTS 'time_mgr'@'%' IDENTIFIED BY 'TimeMgr@2026';
            GRANT SELECT, INSERT, UPDATE, DELETE ON project_time_manager.* TO 'time_mgr'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Compile
        run: mvn compile -q

      - name: Run tests and coverage check
        run: mvn test

      - name: Run entropy cleanup
        run: bash scripts/entropy-cleanup.sh

      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/site/jacoco/
            docs/reports/
            docs/reviews/
